<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca SEMA - MPDFT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --mp-red: #C62828; --mp-gray: #37474F; --mp-light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--mp-light); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--mp-red); text-align: center; border-bottom: 2px solid var(--mp-red); padding-bottom: 10px; margin-bottom: 20px; }
        .status-bar { font-size: 12px; color: #666; text-align: center; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 4px; border: 1px solid #ccc; }
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        .result-card { border: 1px solid #ddd; border-left: 6px solid var(--mp-red); padding: 20px; margin-bottom: 15px; border-radius: 4px; background: #fff; }
        .btn-whatsapp { display: inline-block; margin-top: 15px; text-decoration: none; padding: 10px 20px; border-radius: 4px; color: white; font-weight: bold; background-color: #25D366; }
        .debug-box { display: none; margin-top: 20px; padding: 15px; background: #fff3e0; border: 1px solid #ffe0b2; font-size: 11px; color: #e65100; }
    </style>
</head>
<body>
<div class="container">
    <h1>Encaminhamento de Medidas Alternativas</h1>
    <div id="status" class="status-bar">Tentando conectar à planilha...</div>
    
    <div class="filters">
        <input type="text" id="searchTxt" placeholder="Pesquisar (Promotoria, SEMA ou Telefone)..." onkeyup="filterData()">
        <select id="filterSema" onchange="filterData()"><option value="">Todos os SEMAs</option></select>
    </div>

    <div id="resultsList"></div>
    <div id="debug" class="debug-box"></div>
</div>

<script>
    const SHEET_ID = '1hICJZHdYDwxCCCtXZ2ORmmiTOc_legGzJ82cYC_BVFk';
    const GID = '1056525028';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?gid=${GID}&single=true&output=csv`;
    
    // Usando um proxy alternativo mais robusto
    const PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL)}`;

    let database = [];

    function fetchData() {
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debug');

        Papa.parse(PROXY_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Colunas encontradas:", results.meta.fields);
                
                database = results.data.map(row => {
                    // Busca as colunas mesmo que o nome mude um pouco (espaços ou acentos)
                    const getVal = (names) => {
                        for (let name of names) {
                            if (row[name]) return row[name].trim();
                        }
                        return "";
                    };

                    return {
                        pj: getVal(['Promotoria', 'PROMOTORIA', 'promotoria']),
                        sema: getVal(['SEMA Responsável', 'SEMA', 'sema']),
                        whats: getVal(['WhatsApp', 'WHATSAPP', 'whats']),
                        tel: getVal(['Telefone', 'TELEFONE', 'tel'])
                    };
                }).filter(item => item.pj);

                if (database.length > 0) {
                    statusEl.style.background = "#e8f5e9";
                    statusEl.innerText = `✅ Sincronizado: ${database.length} registros carregados com sucesso.`;
                    setupFilters();
                    renderResults(database);
                } else {
                    statusEl.innerText = "⚠️ Planilha conectada, mas as colunas não foram reconhecidas.";
                    debugEl.style.display = "block";
                    debugEl.innerText = "Colunas lidas: " + results.meta.fields.join(", ");
                }
            },
            error: function(err) {
                statusEl.innerHTML = `<b style="color:red">❌ Erro de Conexão.</b><br>O Google bloqueou o acesso. Verifique se a planilha está 'Publicada na Web'.`;
            }
        });
    }

    function setupFilters() {
        const select = document.getElementById('filterSema');
        const semas = [...new Set(database.map(item => item.sema))].filter(s => s).sort();
        select.innerHTML = '<option value="">Todos os SEMAs</option>';
        semas.forEach(sema => {
            const option = document.createElement('option');
            option.value = sema; option.textContent = sema;
            select.appendChild(option);
        });
    }

    function renderResults(data) {
        const list = document.getElementById('resultsList');
        list.innerHTML = data.length ? '' : '<p style="text-align:center;color:#888;">Nenhum registro encontrado.</p>';
        data.forEach(item => {
            list.innerHTML += `
                <div class="result-card">
                    <h3>${item.pj}</h3>
                    <p><strong>SEMA Responsável:</strong> ${item.sema}</p>
                    <p><strong>Contato:</strong> ${item.tel}</p>
                    <a href="${item.whats}" target="_blank" class="btn btn-whatsapp">Falar no WhatsApp</a>
                </div>`;
        });
    }

    function filterData() {
        const txt = document.getElementById('searchTxt').value.toLowerCase();
        const semaFilter = document.getElementById('filterSema').value;
        const filtered = database.filter(item => {
            const matchTxt = Object.values(item).some(val => String(val).toLowerCase().includes(txt));
            const matchSema = semaFilter === "" || item.sema === semaFilter;
            return matchTxt && matchSema;
        });
        renderResults(filtered);
    }

    fetchData();
</script>
</body>
</html>
